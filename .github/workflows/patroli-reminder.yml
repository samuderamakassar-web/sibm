name: Patroli Reminder

on:
  schedule:
    - cron: "7 2 * * *" # ~11:00 WITA
    - cron: "7 5 * * *" # ~14:00 WITA
    - cron: "7 8 * * *" # ~17:00 WITA
    - cron: "37 10 * * *" # ~19:30 WITA (pre-shift)
    - cron: "7 11 * * *" # ~20:00 WITA (ganti shift malam)
    - cron: "7 14 * * *" # ~23:00 WITA
    - cron: "7 17 * * *" # ~02:00 WITA
    - cron: "7 20 * * *" # ~05:00 WITA
    - cron: "37 22 * * *" # ~07:30 WITA (pre-shift)
    - cron: "7 23 * * *" # ~08:00 WITA (ganti shift pagi)
  workflow_dispatch: {}

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Jalankan reminder
        run: node scripts/patroli-reminder.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
          FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
